name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'ci'
        type: choice
        options:
          - local
          - ci

# 1. Grant permissions required for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 2. Prevent concurrent deployments from stepping on each other
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'ci' }}

    # 3. Define an environment to output the live report URL in the GUI
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      env:
        ENV: ${{ env.TARGET_ENV }}
      continue-on-error: true # Ensure the workflow keeps running to generate reports even if tests fail
        
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # 4. Generate the static Allure Report from test results
    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      # Allure 3 syntax: specify output with -o/--output, input is handled natively or passed differently
      run: |
        npx allure generate -o allure-report allure-results

    # 5. Upload the generated Allure report as a Pages artifact
    - name: Upload Pages Artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report/

    # 6. Deploy the artifact to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      if: ${{ !cancelled() }}
      uses: actions/deploy-pages@v4