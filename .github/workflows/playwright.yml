name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'ci'
        type: choice
        options:
          - local
          - ci

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # JOB 1: Run Tests and Prepare Report Artifact
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'ci' }}

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Speeds up npm ci on consecutive runs
        
    - name: Install dependencies
      run: npm ci
      
    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
        
    - name: Install Playwright OS system dependencies
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Ensure OS dependencies are present (on cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
      
    - name: Run Playwright tests
      run: npx playwright test
      env:
        ENV: ${{ env.TARGET_ENV }}
      continue-on-error: true # Keep going to generate reports even if tests fail
        
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: |
        npx allure generate -o allure-report allure-results

    - name: Upload Pages Artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report/

  # JOB 2: Safely Deploy Report to GitHub Pages
  deploy:
    needs: test
    if: ${{ !cancelled() }} # Ensures the report deploys even if tests failed in the first job
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4