name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'ci'
        type: choice
        options:
          - local
          - ci

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Map the chosen input or fallback to a default for CI triggers
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'ci' }}

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      # Pass the environment variable to your Playwright execution
      run: npx playwright test
      env:
        ENV: ${{ env.TARGET_ENV }}
        
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30